<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polygon AIO - Web Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h1 class="logo">POLYGON <span>AIO</span></h1>
            <nav>
                <ul>
                    <li class="active">Valorant Checker</li>
                    <li>Settings</li>
                    <li>Proxies</li>
                </ul>
            </nav>
        </aside>

        <main class="content">
            <div class="input-section">
                <div class="input-box">
                    <label>Combos (User:Pass)</label>
                    <textarea id="combos-input" placeholder="ernesto:pass123&#10;johndoe:qwerty"></textarea>
                </div>
                <div class="input-box">
                    <label>Proxies (user:pass@ip:port)</label>
                    <textarea id="proxies-input" placeholder="http://user:pass@12.34.56.78:8080"></textarea>
                </div>
                <div class="action-box">
                    <button id="start-btn" class="btn start">START CHECKER</button>
                    <button id="stop-btn" class="btn stop" disabled>STOP</button>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card"><h2>CHECKED</h2><p id="stat-checked">0</p></div>
                <div class="stat-card valid"><h2>VALID (HITS)</h2><p id="stat-valid">0</p></div>
                <div class="stat-card invalid"><h2>INVALID</h2><p id="stat-invalid">0</p></div>
                <div class="stat-card error"><h2>RETRIES/ERROR</h2><p id="stat-error">0</p></div>
            </div>

            <div class="table-container">
                <h3>Live Hits Inventory</h3>
                <table>
                    <thead>
                        <tr>
                            <th>COMBO</th>
                            <th>REGION</th>
                            <th>LEVEL</th>
                            <th>SKINS</th>
                            <th>VP / RP</th>
                        </tr>
                    </thead>
                    <tbody id="hits-table-body">
                        </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
