<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VALOSYNC | Mail Access Professional</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo"><i class="fa-solid fa-crosshairs"></i> VALO<span>SYNC</span></div>
        <nav>
            <div class="nav-item active"><i class="fa-solid fa-envelope-open-text"></i> Mail Searcher</div>
            <div class="nav-item"><i class="fa-solid fa-chart-line"></i> Analytics</div>
            <div class="nav-item"><i class="fa-solid fa-gear"></i> Settings</div>
        </nav>
    </div>

    <div class="container">
        <header>
            <div class="header-info">
                <span id="cpm-display">CPM: 0</span>
                <span id="time-display">Time: 00:00:00</span>
            </div>
            <div class="controls">
                <button id="start-btn" class="btn-primary">START SESSION</button>
                <button id="stop-btn" class="btn-danger" disabled>STOP</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card"><h5>CHECKED</h5><p id="s-checked">0</p></div>
            <div class="stat-card hit"><h5>RIOT FOUND</h5><p id="s-hit">0</p></div>
            <div class="stat-card bad"><h5>INVALID</h5><p id="s-bad">0</p></div>
            <div class="stat-card locked"><h5>LOCKED</h5><p id="s-locked">0</p></div>
        </div>

        <div class="main-grid">
            <div class="input-area">
                <label>Combos (Email:Pass)</label>
                <textarea id="inp-combos" placeholder="example@hotmail.com:password123"></textarea>
                <label>Proxies (Optional)</label>
                <textarea id="inp-proxies" placeholder="user:pass@ip:port"></textarea>
            </div>

            <div class="table-area">
                <div class="table-header">Live Result Analysis</div>
                <div class="scroll-table">
                    <table>
                        <thead>
                            <tr>
                                <th>EMAIL</th>
                                <th>STATUS</th>
                                <th>DATA</th>
                                <th>ACTION</th>
                            </tr>
                        </thead>
                        <tbody id="res-table"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
